name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      # 1. Check out the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up the correct Node.js version from the matrix
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # 3. Install all dependencies cleanly
      - name: Install dependencies
        run: npm ci

      # 4. Install Playwright browsers
      # We only need chromium — our unit tests don't launch browsers
      # but Playwright's test runner still needs at least one browser installed
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # 5. Confirm TypeScript compiles without errors
      - name: Type check
        run: npx tsc --noEmit

      # 6. Confirm the build produces clean dist/ output
      - name: Build
        run: npm run build

      # 7. Run all 53 unit tests
      - name: Test
        run: npm test

      # 8. Confirm the package contents are correct
      - name: Verify package contents
        run: npm pack --dry-run